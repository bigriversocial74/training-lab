name: Training Lab Quality Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-gate:
    name: PHP ${{ matrix.php }} quality gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: mbstring, pdo, pdo_mysql, zip

      - name: Recursive PHP syntax
        run: bash ./run-full-syntax-check.sh

      - name: Role-aware shell and participant home contract
        id: role_contract
        continue-on-error: true
        run: php ./tests/role-aware-shell-participant-home-contract-test.php > role-aware-contract.log 2>&1

      - name: Upload role-aware contract output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: role-aware-contract-php-${{ matrix.php }}
          path: role-aware-contract.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce role-aware contract result
        if: steps.role_contract.outcome == 'failure'
        run: |
          cat role-aware-contract.log
          exit 1

      - name: Role-aware shell and participant home scored audit
        run: php ./scripts/role-aware-shell-participant-home-quality-audit.php

      - name: Campaign discovery detail and enrollment contract
        run: php ./tests/campaign-discovery-detail-enrollment-contract-test.php

      - name: Campaign discovery detail and enrollment scored audit
        run: php ./scripts/campaign-discovery-detail-enrollment-quality-audit.php

      - name: Task detail status and proof revisions contract
        run: php ./tests/task-detail-status-proof-revisions-contract-test.php

      - name: Task detail status and proof revisions scored audit
        run: php ./scripts/task-detail-status-proof-revisions-quality-audit.php

      - name: Reward rules analytics and operational health contract
        run: php ./tests/reward-rules-analytics-operational-health-contract-test.php

      - name: Reward rules analytics and operational health scored audit
        run: php ./scripts/reward-rules-analytics-operational-health-quality-audit.php

      - name: Onboarding and guided empty states contract
        run: php ./tests/onboarding-guided-empty-states-contract-test.php

      - name: Onboarding and guided empty states scored audit
        run: php ./scripts/onboarding-guided-empty-states-quality-audit.php

      - name: Mobile and accessibility completion contract
        run: php ./tests/mobile-accessibility-completion-contract-test.php

      - name: Mobile and accessibility completion scored audit
        run: php ./scripts/mobile-accessibility-completion-quality-audit.php

      - name: End-to-end acceptance and deployment contract
        run: php ./tests/end-to-end-acceptance-deployment-contract-test.php

      - name: End-to-end acceptance and deployment scored audit
        run: php ./scripts/end-to-end-acceptance-deployment-quality-audit.php

      - name: Production deployment and live acceptance contract
        run: php ./tests/production-deployment-live-acceptance-contract-test.php

      - name: Production deployment and live acceptance scored audit
        run: php ./scripts/production-deployment-live-acceptance-quality-audit.php

      - name: Pilot operations and communications contract
        id: pilot_communications_contract
        continue-on-error: true
        run: php ./tests/pilot-operations-communications-contract-test.php > pilot-communications-contract.log 2>&1

      - name: Upload pilot communications contract output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pilot-communications-contract-php-${{ matrix.php }}
          path: pilot-communications-contract.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce pilot communications contract result
        if: steps.pilot_communications_contract.outcome == 'failure'
        run: |
          cat pilot-communications-contract.log
          exit 1

      - name: Pilot operations and communications scored audit
        run: php ./scripts/pilot-operations-communications-quality-audit.php

      - name: Build and verify release package
        id: release_package
        continue-on-error: true
        run: |
          set -o pipefail
          php ./bin/build-release-package.php --release=${{ github.sha }} --output=./dist/ci-training-lab.zip 2>&1 | tee release-package.log
          php ./bin/verify-release-package.php --file=./dist/ci-training-lab.zip 2>&1 | tee -a release-package.log

      - name: Upload release package diagnostics
        if: steps.release_package.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: release-package-php-${{ matrix.php }}
          path: release-package.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce release package result
        if: steps.release_package.outcome == 'failure'
        run: |
          cat release-package.log
          exit 1

      - name: Security runtime contract
        run: php ./tests/security-runtime-test.php

      - name: Production runtime acceptance contract
        run: php ./tests/production-runtime-acceptance-contract-test.php

      - name: Stage 886 account integration contract
        run: php ./tests/stage886-account-integration-contract-test.php

      - name: Stage 889 shared session hardening contract
        run: php ./tests/stage889-shared-session-hardening-contract-test.php

      - name: Stage 890 reward handoff outbox contract
        run: php ./tests/stage890-reward-handoff-outbox-contract-test.php

      - name: Stage 891 reward handoff recovery contract
        run: php ./tests/stage891-reward-handoff-recovery-contract-test.php

      - name: Stage 892 scheduled worker contract
        run: php ./tests/stage892-scheduled-worker-contract-test.php

      - name: Stage 893 external delivery reconciliation contract
        run: php ./tests/stage893-external-delivery-reconciliation-contract-test.php

      - name: Stage 894 signed reward lookup client contract
        run: php ./tests/stage894-signed-reward-lookup-client-contract-test.php

      - name: Stage 895 signed integration acceptance contract
        run: php ./tests/stage895-signed-integration-acceptance-contract-test.php

      - name: Stage 896 limited reward pilot contract
        run: php ./tests/stage896-limited-reward-pilot-contract-test.php

      - name: Stage 896 scored quality audit
        run: php ./scripts/stage896-quality-audit.php

      - name: Stage 897 controlled batch rollout contract
        run: php ./tests/stage897-controlled-batch-rollout-contract-test.php

      - name: Stage 897 scored quality audit
        run: php ./scripts/stage897-quality-audit.php

      - name: Stage 898 worker canary monitoring contract
        run: php ./tests/stage898-worker-canary-monitoring-contract-test.php

      - name: Stage 898 scored quality audit
        run: php ./scripts/stage898-quality-audit.php

      - name: Stage 899 canary graduation limited scheduling contract
        run: php ./tests/stage899-canary-graduation-limited-scheduled-processing-contract-test.php

      - name: Stage 899 scored quality audit
        run: php ./scripts/stage899-quality-audit.php

      - name: Data integrity contract
        run: php ./tests/data-integrity-contract-test.php

      - name: HTTP route contract
        run: php ./tests/http-route-contract-test.php

      - name: Scored quality audit
        run: php ./scripts/quality-audit.php
