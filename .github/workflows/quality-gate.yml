name: Training Lab Quality Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'qa/**'

permissions:
  contents: read

jobs:
  quality-gate:
    name: PHP ${{ matrix.php }} quality gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: mbstring, pdo, pdo_mysql

      - name: Recursive PHP syntax
        run: bash ./run-full-syntax-check.sh

      - name: Security runtime contracts
        run: php ./tests/security-runtime-test.php

      - name: Production runtime acceptance contracts
        run: php ./tests/production-runtime-acceptance-contract-test.php

      - name: Stage 886 shared account contracts
        run: php ./tests/stage886-account-integration-contract-test.php

      - name: Data-integrity contracts
        run: php ./tests/data-integrity-contract-test.php

      - name: HTTP route contracts
        run: php ./tests/http-route-contract-test.php

      - name: Section scoring
        run: php ./scripts/quality-audit.php
