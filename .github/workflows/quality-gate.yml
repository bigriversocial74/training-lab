name: Training Lab Quality Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'qa/**'

permissions:
  contents: read

jobs:
  quality-gate:
    name: PHP ${{ matrix.php }} quality gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: mbstring, pdo, pdo_mysql

      - name: Run syntax and repository quality gates
        run: bash ./run-quality-gate.sh
