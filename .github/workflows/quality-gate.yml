name: Training Lab Quality Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-gate:
    name: PHP ${{ matrix.php }} quality gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: mbstring, pdo, pdo_mysql

      - name: Recursive PHP syntax
        run: bash ./run-full-syntax-check.sh

      - name: Security runtime contract
        run: php ./tests/security-runtime-test.php

      - name: Production runtime acceptance contract
        run: php ./tests/production-runtime-acceptance-contract-test.php

      - name: Stage 886 account integration contract
        run: php ./tests/stage886-account-integration-contract-test.php

      - name: Stage 889 shared session hardening contract
        run: php ./tests/stage889-shared-session-hardening-contract-test.php

      - name: Stage 890 reward handoff outbox contract
        run: php ./tests/stage890-reward-handoff-outbox-contract-test.php

      - name: Stage 891 reward handoff recovery contract
        run: php ./tests/stage891-reward-handoff-recovery-contract-test.php

      - name: Stage 892 scheduled worker contract
        run: php ./tests/stage892-scheduled-worker-contract-test.php

      - name: Stage 893 external delivery reconciliation contract
        run: php ./tests/stage893-external-delivery-reconciliation-contract-test.php

      - name: Stage 894 signed reward lookup client contract
        run: php ./tests/stage894-signed-reward-lookup-client-contract-test.php

      - name: Stage 895 signed integration acceptance contract
        run: php ./tests/stage895-signed-integration-acceptance-contract-test.php

      - name: Stage 896 limited reward pilot contract
        run: php ./tests/stage896-limited-reward-pilot-contract-test.php

      - name: Stage 896 scored quality audit
        run: php ./scripts/stage896-quality-audit.php

      - name: Stage 897 controlled batch rollout contract
        run: php ./tests/stage897-controlled-batch-rollout-contract-test.php

      - name: Stage 897 scored quality audit
        run: php ./scripts/stage897-quality-audit.php

      - name: Data integrity contract
        run: php ./tests/data-integrity-contract-test.php

      - name: HTTP route contract
        run: php ./tests/http-route-contract-test.php

      - name: Scored quality audit
        run: php ./scripts/quality-audit.php
