name: PHP Syntax

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'qa/**'
      - 'docs/**'
      - 'import/**'
      - 'adapter/**'
      - 'ops/**'

permissions:
  contents: read

jobs:
  runner-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Runner and bundled PHP
        run: |
          uname -a
          command -v php || true
          php -v || true

  checkout-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Confirm checkout
        run: test -f run-full-syntax-check.sh

  php-setup-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Confirm PHP
        run: php -v

  php-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Run recursive syntax check
        run: bash ./run-full-syntax-check.sh
