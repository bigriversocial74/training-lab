name: PHP Syntax

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'qa/**'
      - 'docs/**'
      - 'import/**'
      - 'adapter/**'
      - 'ops/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  php-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Run recursive syntax check
        id: syntax
        continue-on-error: true
        run: bash ./run-full-syntax-check.sh > php-syntax.log 2>&1

      - name: Upload syntax output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-syntax-output
          path: php-syntax.log
          if-no-files-found: error
          retention-days: 7

      - name: Comment failed syntax output
        if: github.event_name == 'pull_request' && steps.syntax.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('php-syntax.log', 'utf8').slice(-12000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### PHP syntax diagnostic\n\n\`\`\`text\n${log}\n\`\`\``
            });

      - name: Enforce syntax result
        if: steps.syntax.outcome == 'failure'
        run: |
          cat php-syntax.log
          exit 1
