name: PHP Syntax

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'qa/**'
      - 'docs/**'
      - 'import/**'
      - 'adapter/**'
      - 'ops/**'

permissions:
  contents: read

jobs:
  php-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Run recursive syntax check
        id: syntax
        continue-on-error: true
        run: bash ./run-full-syntax-check.sh > php-syntax.log 2>&1

      - name: Upload syntax output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-syntax-output
          path: php-syntax.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce syntax result
        if: steps.syntax.outcome == 'failure'
        run: |
          cat php-syntax.log
          exit 1
