name: PHP Syntax

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'qa/**'
      - 'docs/**'
      - 'import/**'

permissions:
  contents: read

jobs:
  php-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Run recursive syntax check
        run: bash ./run-full-syntax-check.sh
